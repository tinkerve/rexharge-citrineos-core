table:
  name: Components
  schema: public
object_relationships:
  - name: EvseType
    using:
      foreign_key_constraint_on: evseDatabaseId
  - name: Tenant
    using:
      foreign_key_constraint_on: tenantId
array_relationships:
  - name: ComponentVariables
    using:
      foreign_key_constraint_on:
        column: componentId
        table:
          name: ComponentVariables
          schema: public
  - name: EventData
    using:
      foreign_key_constraint_on:
        column: componentId
        table:
          name: EventData
          schema: public
  - name: MessageInfos
    using:
      foreign_key_constraint_on:
        column: displayComponentId
        table:
          name: MessageInfos
          schema: public
  - name: VariableAttributes
    using:
      foreign_key_constraint_on:
        column: componentId
        table:
          name: VariableAttributes
          schema: public
  - name: VariableMonitorings
    using:
      foreign_key_constraint_on:
        column: componentId
        table:
          name: VariableMonitorings
          schema: public
insert_permissions:
  - role: user
    permission:
      check:
        tenantId:
          _eq: x-hasura-tenant-id
      columns: '*'
    comment: ""
select_permissions:
  - role: user
    permission:
      columns: '*'
      filter:
        tenantId:
          _eq: x-hasura-tenant-id
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: user
    permission:
      columns: '*'
      filter:
        tenantId:
          _eq: x-hasura-tenant-id
      check:
        tenantId:
          _eq: x-hasura-tenant-id
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        tenantId:
          _eq: x-hasura-tenant-id
    comment: ""
