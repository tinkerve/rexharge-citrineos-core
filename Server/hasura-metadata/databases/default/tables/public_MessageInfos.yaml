table:
  name: MessageInfos
  schema: public
object_relationships:
  - name: Component
    using:
      foreign_key_constraint_on: displayComponentId
  - name: Tenant
    using:
      foreign_key_constraint_on: tenantId
select_permissions:
  - role: user
    permission:
      columns: '*'
      filter:
        tenantId:
          _eq: x-hasura-tenant-id
      allow_aggregations: true
    comment: ""
