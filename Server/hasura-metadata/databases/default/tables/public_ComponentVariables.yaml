table:
  name: ComponentVariables
  schema: public
object_relationships:
  - name: Component
    using:
      foreign_key_constraint_on: componentId
  - name: Tenant
    using:
      foreign_key_constraint_on: tenantId
  - name: Variable
    using:
      foreign_key_constraint_on: variableId
insert_permissions:
  - role: user
    permission:
      check:
        tenantId:
          _eq: x-hasura-tenant-id
      columns: '*'
    comment: ""
select_permissions:
  - role: user
    permission:
      columns: '*'
      filter:
        tenantId:
          _eq: x-hasura-tenant-id
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: user
    permission:
      columns: '*'
      filter:
        tenantId:
          _eq: x-hasura-tenant-id
      check:
        tenantId:
          _eq: x-hasura-tenant-id
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        tenantId:
          _eq: x-hasura-tenant-id
    comment: ""
