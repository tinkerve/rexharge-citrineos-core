table:
  name: ChargingStations
  schema: public
object_relationships:
  - name: Location
    using:
      foreign_key_constraint_on: locationId
  - name: Tenant
    using:
      foreign_key_constraint_on: tenantId
array_relationships:
  - name: ChargingStationNetworkProfiles
    using:
      foreign_key_constraint_on:
        column: stationPkId
        table:
          name: ChargingStationNetworkProfiles
          schema: public
  - name: ChargingStationSecurityInfos
    using:
      foreign_key_constraint_on:
        column: stationPkId
        table:
          name: ChargingStationSecurityInfos
          schema: public
  - name: ChargingStationSequences
    using:
      foreign_key_constraint_on:
        column: stationPkId
        table:
          name: ChargingStationSequences
          schema: public
  - name: Connectors
    using:
      foreign_key_constraint_on:
        column: stationPkId
        table:
          name: Connectors
          schema: public
  - name: DeleteCertificateAttempts
    using:
      foreign_key_constraint_on:
        column: stationPkId
        table:
          name: DeleteCertificateAttempts
          schema: public
  - name: EventData
    using:
      foreign_key_constraint_on:
        column: stationPkId
        table:
          name: EventData
          schema: public
  - name: Evses
    using:
      foreign_key_constraint_on:
        column: stationPkId
        table:
          name: Evses
          schema: public
  - name: InstallCertificateAttempts
    using:
      foreign_key_constraint_on:
        column: stationPkId
        table:
          name: InstallCertificateAttempts
          schema: public
  - name: InstalledCertificates
    using:
      foreign_key_constraint_on:
        column: stationPkId
        table:
          name: InstalledCertificates
          schema: public
  - name: LatestStatusNotifications
    using:
      foreign_key_constraint_on:
        column: stationPkId
        table:
          name: LatestStatusNotifications
          schema: public
  - name: OCPPMessages
    using:
      foreign_key_constraint_on:
        column: stationPkId
        table:
          name: OCPPMessages
          schema: public
  - name: SetNetworkProfiles
    using:
      foreign_key_constraint_on:
        column: stationPkId
        table:
          name: SetNetworkProfiles
          schema: public
  - name: StatusNotifications
    using:
      foreign_key_constraint_on:
        column: stationPkId
        table:
          name: StatusNotifications
          schema: public
  - name: Transactions
    using:
      foreign_key_constraint_on:
        column: stationPkId
        table:
          name: Transactions
          schema: public
  - name: VariableAttributes
    using:
      foreign_key_constraint_on:
        column: stationPkId
        table:
          name: VariableAttributes
          schema: public
  - name: VariableMonitorings
    using:
      foreign_key_constraint_on:
        column: stationPkId
        table:
          name: VariableMonitorings
          schema: public
insert_permissions:
  - role: user
    permission:
      check:
        tenantId:
          _eq: x-hasura-tenant-id
      columns: '*'
    comment: ""
select_permissions:
  - role: user
    permission:
      columns: '*'
      filter:
        tenantId:
          _eq: x-hasura-tenant-id
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: user
    permission:
      columns: '*'
      filter:
        tenantId:
          _eq: x-hasura-tenant-id
      check:
        tenantId:
          _eq: x-hasura-tenant-id
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        tenantId:
          _eq: x-hasura-tenant-id
    comment: ""
