table:
  name: VariableAttributes
  schema: public
object_relationships:
  - name: Boot
    using:
      foreign_key_constraint_on: bootConfigId
  - name: ChargingStation
    using:
      foreign_key_constraint_on: stationId
  - name: Component
    using:
      foreign_key_constraint_on: componentId
  - name: EvseType
    using:
      foreign_key_constraint_on: evseDatabaseId
  - name: Tenant
    using:
      foreign_key_constraint_on: tenantId
  - name: Variable
    using:
      foreign_key_constraint_on: variableId
array_relationships:
  - name: VariableStatuses
    using:
      foreign_key_constraint_on:
        column: variableAttributeId
        table:
          name: VariableStatuses
          schema: public
insert_permissions:
  - role: user
    permission:
      check:
        tenantId:
          _eq: x-hasura-tenant-id
      columns: '*'
    comment: ""
select_permissions:
  - role: user
    permission:
      columns: '*'
      filter:
        tenantId:
          _eq: x-hasura-tenant-id
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: user
    permission:
      columns: '*'
      filter:
        tenantId:
          _eq: x-hasura-tenant-id
      check:
        tenantId:
          _eq: x-hasura-tenant-id
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        tenantId:
          _eq: x-hasura-tenant-id
    comment: ""
