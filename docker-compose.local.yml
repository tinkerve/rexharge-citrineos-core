#
# Local-build override for docker-compose.yml. Applied via the launcher's
# `--local` flag (`pnpm citrine --local`), which expands to:
#
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build
#
# It only adds `build:` blocks (merged by service name) so the published images
# in the base file are built from local source instead of pulled.
services:
  citrine:
    build:
      context: .
      dockerfile: ./apps/ocpp-server/deploy.Dockerfile

  citrine-ui:
    build:
      context: .
      dockerfile: ./apps/operator-ui/Dockerfile

  citrineos-ocpi:
    build:
      context: .
      dockerfile: ./apps/ocpi-server/deploy.Dockerfile
